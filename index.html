<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Andy Sun (孙熙腾) | Software Engineering Student</title>
    <meta name="description" content="Personal CV website for Andy Sun (孙熙腾), a second-year Software Engineering student at the University of Auckland. Includes skills, contact, portfolio, and Loffee Focus." />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Andy Sun (孙熙腾) | Software Engineering Student" />
    <meta property="og:description" content="Personal CV website with education, technical skills, contact info, portfolio, and Loffee Focus as a sub section." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Andy Sun (孙熙腾) | Software Engineering Student" />
    <meta property="twitter:description" content="Personal CV website with skills, portfolio, and Loffee Focus as a sub section." />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Handle iPhone Notch Safe Area */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      
      /* Smooth transitions */
      * {
        transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 150ms;
        /* Prevent tap highlight on mobile */
        -webkit-tap-highlight-color: transparent;
      }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalhost =
            window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1';

          if (isLocalhost) {
            navigator.serviceWorker.getRegistrations()
              .then(registrations => Promise.all(registrations.map(reg => reg.unregister())))
              .catch(err => console.log('SW unregister failed', err));
            return;
          }

          fetch('/sw.js', { method: 'HEAD' })
            .then(response => {
              if (!response.ok) return;
              return navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW failed', err));
            })
            .catch(err => console.log('SW availability check failed', err));
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
